name: miakhalifa
description: "StackSense - Supplement Tracker with Liquid Glass UI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Networking
  dio: ^5.8.0
  
  # Charts
  fl_chart: ^0.70.2
  
  # Animations
  flutter_animate: ^4.5.2
  
  # Haptics
  vibration: ^3.1.3
  
  # Local Storage (fallback/cache)
  shared_preferences: ^2.5.2
  
  # Date formatting
  intl: ^0.19.0
  
  # Icons
  font_awesome_flutter: ^10.8.0
  
  # Liquid glass / blur effects
  blur: ^4.0.0
  
  # UUID generation
  uuid: ^4.5.1
  
  # Shimmer loading
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Artific
      fonts:
        - asset: assets/fonts/Artific-Light.otf
          weight: 300
        - asset: assets/fonts/Artific-Regular.otf
          weight: 400
        - asset: assets/fonts/Artific-Medium.otf
          weight: 500
        - asset: assets/fonts/Artific-Bold.otf
          weight: 700
        - asset: assets/fonts/Artific-Black.otf
          weight: 900
